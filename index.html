<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="startScreen">
        <img id="gameIcon" src="assets/icon.png" alt="Game Icon">
        <p id="startHighestScore">最高得分: <span id="startHighestScoreValue">0</span></p>
        <button id="startBtn">开始游戏</button>
    </div>
    <div id="controlScreen" class="hidden">
        <h2>选择控制方式</h2>
        <div id="controlOptions">
            <div id="keyboardOption" class="controlOption">
                <img src="assets/keyboard.jpg" alt="Keyboard">
                <span>键盘控制</span>
            </div>
            <div id="mouseOption" class="controlOption">
                <img src="assets/mouse.jpg" alt="Mouse">
                <span>鼠标控制</span>
            </div>
        </div>
    </div>
    <div id="modeScreen" class="hidden">
        <h2>选择游戏模式</h2>
        <div id="modeOptions">
            <div id="endlessOption" class="controlOption">
                <img src="assets/Model1.jpg" alt="Endless Mode">
                <span>无尽模式</span>
            </div>
            <div id="bossOption" class="controlOption">
                <img src="assets/Model2.jpg" alt="Boss Mode">
                <span>Boss模式</span>
            </div>
        </div>
        <button id="backToControlBtn" class="backBtn">返回</button>
    </div>
    <div id="bossSelectScreen" class="hidden">
        <h2>Boss选择</h2>
        <div id="bossOptions">
            <div id="boss1Option" class="bossOption">
                <img src="assets/3.1.1.png" alt="Boss 1">
                <button id="boss1Btn" class="bossBtn">熔岩飞轮</button>
            </div>
            <div id="boss2Option" class="bossOption">
                <img src="assets/4.1.1.png" alt="Boss 2">
                <button id="boss2Btn" class="bossBtn">超时空战神</button>
            </div>
            <div id="boss3Option" class="bossOption">
                <img src="assets/5.1.1.jpg" alt="Boss 3">
                <button id="boss3Btn" class="bossBtn">荷鲁斯之眼</button>
            </div>
            <div id="boss4Option" class="bossOption">
                <img src="assets/6.1.1.png" alt="Boss 4">
                <button id="boss4Btn" class="bossBtn">吞噬黑洞</button>
            </div>
        </div>
        <button id="backToModeFromBossBtn" class="backBtn">返回</button>
    </div>
    <div id="bossGameOver" class="hidden">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <button id="boss1RestartBtn">重新开始</button>
            <button id="boss1BackBtn" class="backToModeBtn">返回</button>
        </div>
    </div>
    <div id="boss2GameOver" class="hidden">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <button id="boss2RestartBtn">重新开始</button>
            <button id="boss2BackBtn" class="backToModeBtn">返回</button>
        </div>
    </div>
    <div id="boss3GameOver" class="hidden">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <button id="boss3RestartBtn">重新开始</button>
            <button id="boss3BackBtn" class="backToModeBtn">返回</button>
        </div>
    </div>
    <div id="boss4GameOver" class="hidden">
        <div class="game-over-content">
            <h2>游戏结束</h2>
            <button id="boss4RestartBtn">重新开始</button>
            <button id="boss4BackBtn" class="backToModeBtn">返回</button>
        </div>
    </div>
    <div id="ui">
        <div id="scoreDisplay">分数: <span id="scoreValue">0</span></div>
        <div id="gameOver" class="hidden">
            <div class="game-over-content">
                <h2>游戏结束</h2>
                <p class="final-score-p">最终得分: <span id="finalScore">0</span></p>
                <p class="highest-score-p">最高得分: <span id="highestScore">0</span></p>
                <button id="restartBtn">重新开始</button>
                <button id="backToModeBtn" class="backToModeBtn">返回主页</button>
            </div>
        </div>
    </div>
    <div id="mobileLoadingScreen" class="hidden">
        <div class="mobile-loading-content">
            <img id="mobileLoadingIcon" src="assets/icon.png" alt="Loading">
            <p id="mobileLoadingText">加载中... 0%</p>
            <div id="mobileLoadingBar"><div id="mobileLoadingProgress"></div></div>
        </div>
    </div>
    <script src="script.js?v=3"></script>
</body>
</html>
