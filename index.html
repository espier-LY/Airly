<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="startScreen">
        <img id="gameIcon" src="assets/icon.png" alt="Game Icon">
        <button id="startBtn">开始游戏</button>
    </div>
    <div id="controlScreen" class="hidden">
        <h2>选择控制方式</h2>
        <div id="controlOptions">
            <div id="keyboardOption" class="controlOption">
                <img src="assets/keyboard.jpg" alt="Keyboard">
                <span>键盘控制</span>
            </div>
            <div id="mouseOption" class="controlOption">
                <img src="assets/mouse.jpg" alt="Mouse">
                <span>鼠标控制</span>
            </div>
        </div>
    </div>
    <div id="ui">
        <div id="scoreDisplay">分数: <span id="scoreValue">0</span></div>
        <div id="gameOver" class="hidden">
            <div class="game-over-content">
                <h2>游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button id="restartBtn">重新开始</button>
            </div>
        </div>
    </div>
    <script src="script.js?v=3"></script>
</body>
</html>
